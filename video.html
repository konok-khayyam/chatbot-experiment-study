<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>Video Exposure</title>

  <link rel="stylesheet"
        href="css/style.css" />

</head>

<body>

  <div class="page-container">

    <!-- Progress -->

    <div class="progress-wrapper">

      <div class="progress-bar">

        <div class="progress-fill"
             style="width: 40%">
        </div>

      </div>

      <p class="progress-text">
        Step 6 of 15
      </p>

    </div>

    <!-- Main Card -->

    <div class="content-card">

      <h1 class="page-title">
        Video Exposure
      </h1>

      <p class="page-description">

        Please watch the following video carefully.

        <br><br>

        The Continue button will activate after most of the video has been viewed.

      </p>

      <!-- Video -->

      <div class="video-wrapper">

        <iframe
          id="studyVideo"
          width="100%"
          height="500"
          src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1&controls=0&disablekb=1&modestbranding=1&rel=0"
          title="Study Video"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>

        </iframe>

      </div>

      <!-- Status -->

      <p id="videoStatus"
         class="video-status">

        Please watch the video to continue.

      </p>

      <!-- Continue -->

      <div class="button-container">

        <button
          id="continueBtn"
          class="primary-button"
          disabled>

          Continue

        </button>

      </div>

    </div>

  </div>

  <!-- YouTube API -->

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>

    // =====================================
    // VIDEO VARIABLES
    // =====================================

    let player;

    let trackingInterval;

    let videoStarted = false;

    let videoCompleted = false;

    let videoStartTimestamp = null;

    let videoEndTimestamp = null;

    let watchTime = 0;

    let pauseCount = 0;

    let rewatchCount = 0;

    let maxWatchedSecond = 0;

    let previousSecond = 0;

    let videoDuration = 0;

    // =====================================
    // CREATE PLAYER
    // =====================================

    function onYouTubeIframeAPIReady() {

      player = new YT.Player(
        'studyVideo',
        {

          events: {

            'onStateChange':
              onPlayerStateChange

          }

        }
      );

    }

    // =====================================
    // PLAYER STATE
    // =====================================

    function onPlayerStateChange(event) {

      // PLAYING

      if (
        event.data === YT.PlayerState.PLAYING
      ) {

        if (!videoStarted) {

          videoStarted = true;

          videoStartTimestamp =
            new Date().toISOString();

        }

        videoDuration =
          player.getDuration();

        startTracking();

      }

      // PAUSED

      else if (
        event.data === YT.PlayerState.PAUSED
      ) {

        pauseCount++;

        clearInterval(
          trackingInterval
        );

      }

      // ENDED

      else if (
        event.data === YT.PlayerState.ENDED
      ) {

        videoEndTimestamp =
          new Date().toISOString();

        clearInterval(
          trackingInterval
        );

      }

    }

    // =====================================
    // TRACK WATCHING
    // =====================================

    function startTracking() {

      clearInterval(
        trackingInterval
      );

      trackingInterval = setInterval(
        () => {

          if (
            !player
            ||
            !player.getCurrentTime
          ) {
            return;
          }

          const currentSecond =
            player.getCurrentTime();

          // WATCH TIME

          watchTime++;

          // REWATCH DETECTION

          if (
            currentSecond <
            previousSecond - 2
          ) {

            rewatchCount++;

          }

          previousSecond =
            currentSecond;

          // MAX WATCHED

          if (
            currentSecond >
            maxWatchedSecond
          ) {

            maxWatchedSecond =
              currentSecond;

          }

          // WATCH PERCENTAGE

          const watchPercentage =
            (
              maxWatchedSecond /
              videoDuration
            ) * 100;

          // ENABLE BUTTON AT 90%

          if (
            watchPercentage >= 90
            &&
            !videoCompleted
          ) {

            videoCompleted = true;

            document.getElementById(
              "continueBtn"
            ).disabled = false;

            document.getElementById(
              "videoStatus"
            ).innerText =

              "Video completed. You may continue.";

          }

        },

        1000
      );

    }

    // =====================================
    // CONTINUE BUTTON
    // =====================================

    document.getElementById(
      "continueBtn"
    ).addEventListener(
      "click",
      async () => {

        try {

          const watchPercentage =
            (
              maxWatchedSecond /
              videoDuration
            ) * 100;

          // VIDEO END TIME

          if (!videoEndTimestamp) {

            videoEndTimestamp =
              new Date().toISOString();

          }

          // =====================================
          // SEND VIDEO METRICS
          // =====================================

          await fetch(
            "https://n8n.media.tuwien.ac.at/webhook/save-consent",
            {

              method: "POST",

              headers: {

                "Content-Type":
                  "application/json"

              },

              body: JSON.stringify({

                action:
                  "save_video_metrics",

                session_id:
                  localStorage.getItem(
                    "session_id"
                  ),

                video_start_timestamp:
                  videoStartTimestamp,

                video_end_timestamp:
                  videoEndTimestamp,

                video_duration:
                  Math.round(
                    videoDuration
                  ),

                watch_time:
                  watchTime,

                watch_percentage:
                  Math.round(
                    watchPercentage
                  ),

                rewatch_count:
                  rewatchCount,

                pause_count:
                  pauseCount,

                video_condition_id:
                  localStorage.getItem(
                    "condition"
                  ),

                video_completed:
                  videoCompleted
                    ? "yes"
                    : "no",

                video_completed_timestamp:
                  new Date().toISOString()

              })

            }
          );

          // =====================================
          // REDIRECT
          // =====================================

          window.location.replace(
            "chat.html"
          );

        }

        catch (error) {

          console.error(error);

          alert(
            "Error saving video data."
          );

        }

      }
    );

  </script>

  <!-- BACK BLOCK -->

  <script>

    history.pushState(
      null,
      null,
      location.href
    );

    window.onpopstate = function () {

      history.go(1);

    };

  </script>

</body>

</html>
