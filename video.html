<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>Video Exposure</title>

  <link rel="stylesheet"
        href="css/style.css" />

</head>

<body>

  <div class="page-container">

    <!-- Progress -->

    <div class="progress-wrapper">

      <div class="progress-bar">

        <div class="progress-fill"
             style="width: 70%">
        </div>

      </div>

      <p class="progress-text">
        Video Exposure
      </p>

    </div>

    <!-- Main Card -->

    <div class="content-card">

      <h1 class="page-title">
        Video Exposure
      </h1>

      <p class="page-description">

        Please watch the following video carefully.

        <br><br>

        The Continue button will activate after most of the video has been viewed.

      </p>

      <!-- Video -->

      <div class="video-wrapper">

        <iframe
          id="studyVideo"
          width="100%"
          height="500"
          src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1"
          title="Study Video"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>

        </iframe>

      </div>

      <!-- Status -->

      <p id="videoStatus"
         class="video-status">

        Please watch the video to continue.

      </p>

      <!-- Continue -->

      <div class="button-container">

        <button
          id="continueBtn"
          class="primary-button"
          disabled>

          Continue

        </button>

      </div>

    </div>

  </div>

  <!-- YouTube API -->

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>

    let player;

    let watchInterval;

    let videoCompleted = false;

    // =====================================
    // CREATE PLAYER
    // =====================================

    function onYouTubeIframeAPIReady() {

      player = new YT.Player(
        'studyVideo',
        {

          events: {

            'onStateChange':
              onPlayerStateChange

          }

        }
      );

    }

    // =====================================
    // TRACK VIDEO
    // =====================================

    function onPlayerStateChange(event) {

      // PLAYING

      if (
        event.data === YT.PlayerState.PLAYING
      ) {

        startTracking();

      }

      // PAUSED

      else {

        clearInterval(
          watchInterval
        );

      }

    }

    // =====================================
    // WATCH TRACKING
    // =====================================

    function startTracking() {

      watchInterval = setInterval(
        () => {

          if (!player || !player.getDuration) {
            return;
          }

          const currentTime =
            player.getCurrentTime();

          const duration =
            player.getDuration();

          if (!duration) {
            return;
          }

          const progress =
            (currentTime / duration) * 100;

          // UPDATE STATUS

          document.getElementById(
            "videoStatus"
          ).innerText =

            "Video watched: "
            +
            Math.floor(progress)
            +
            "%";

          // ENABLE AFTER 90%

          if (
            progress >= 90
            &&
            !videoCompleted
          ) {

            videoCompleted = true;

            clearInterval(
              watchInterval
            );

            document.getElementById(
              "continueBtn"
            ).disabled = false;

            document.getElementById(
              "videoStatus"
            ).innerText =

              "Video completed. You may continue.";

            // SAVE LOCAL FLAG

            localStorage.setItem(
              "videoCompleted",
              "true"
            );

            localStorage.setItem(
              "videoCompletedAt",
              new Date().toISOString()
            );

          }

        },

        1000
      );

    }

    // =====================================
    // CONTINUE
    // =====================================

    document.getElementById(
      "continueBtn"
    ).addEventListener(
      "click",
      () => {

        window.location.href =
          "chat.html";

      }
    );

  </script>

</body>

</html>
