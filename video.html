<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0"/>

  <title>Video Introduction</title>

  <link rel="stylesheet"
        href="css/style.css" />

</head>

<body>

  <div class="page-container">

    <!-- Progress -->

    <div class="progress-wrapper">

      <div class="progress-bar">

        <div class="progress-fill"
             style="width: 40%">
        </div>

      </div>

      <p class="progress-text">
        Step 2 of 5
      </p>

    </div>

    <!-- Main Card -->

    <div class="content-card">

      <h1 class="page-title">
        Introduction Video
      </h1>

      <p class="page-description">

        Please watch the following short video before
        continuing to the next part of the study.

      </p>

      <!-- Video Wrapper -->

      <div class="video-wrapper">

        <iframe
          id="studyVideo"
          width="100%"
          height="450"
          src="https://www.youtube.com/embed/dQw4w9WgXcQ?enablejsapi=1"
          title="Study Video"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>

        </iframe>

      </div>

      <!-- Video Status -->

      <p id="videoStatus"
         class="video-status">

        Please start the video to continue.

      </p>

      <!-- Continue Button -->

      <button id="continueBtn"
              class="primary-button"
              disabled>

        Continue

      </button>

    </div>

  </div>

  <!-- YouTube API -->

  <script src="https://www.youtube.com/iframe_api"></script>

  <script>

    let player;
    let videoStarted = false;

    // =====================================
    // CREATE YOUTUBE PLAYER
    // =====================================

    function onYouTubeIframeAPIReady() {

      player = new YT.Player(
        'studyVideo',
        {

          events: {

            'onStateChange':
              onPlayerStateChange

          }

        }
      );

    }

    // =====================================
    // VIDEO INTERACTION
    // =====================================

    function onPlayerStateChange(event) {

      // PLAYING

      if (
        event.data === YT.PlayerState.PLAYING
        &&
        !videoStarted
      ) {

        videoStarted = true;

        document.getElementById(
          "videoStatus"
        ).innerText =
          "Video started. You may continue after watching.";

        document.getElementById(
          "continueBtn"
        ).disabled = false;

        // save interaction timestamp

        localStorage.setItem(
          "videoStartedAt",
          new Date().toISOString()
        );

      }

    }

    // =====================================
    // CONTINUE BUTTON
    // =====================================

    document.getElementById(
      "continueBtn"
    ).addEventListener(
      "click",
      () => {

        localStorage.setItem(
          "videoCompleted",
          "true"
        );

        window.location.href =
          "pre-survey.html";

      }
    );

  </script>

</body>

</html>
