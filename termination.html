<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Study Unavailable</title>

  <link rel="stylesheet"
        href="css/style.css" />

</head>

<body>

  <div class="page-container">

    <!-- Progress -->

    <div class="progress-wrapper">

      <div class="progress-bar">

        <div class="progress-fill"
             style="width: 18%">
        </div>

      </div>

      <p class="progress-text">
        Eligibility Check
      </p>

    </div>

    <!-- Main Card -->

    <div class="content-card">

      <h1 class="page-title">
        Thank You
      </h1>

      <p class="page-description">

        Unfortunately, you are not eligible to continue with this study based on the eligibility requirements.

        <br><br>

        We appreciate your interest and time.

      </p>


      <!-- Close Button -->

      <div class="button-container">

        <button
          class="primary-button"
          onclick="window.close()">

          Close Page

        </button>

      </div>

    </div>

  </div>
  <script>

  // =====================================
  // TERMINATION FLAG
  // =====================================

  localStorage.setItem(
    "study_terminated",
    "true"
  );

  // =====================================
  // PREVENT BACK NAVIGATION
  // =====================================

  history.pushState(
    null,
    null,
    location.href
  );

  window.onpopstate = function () {

    history.go(1);

  };

</script>

</body>

</html>
