<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Pre-Survey</title>

  <link rel="stylesheet"
        href="css/style.css" />

  <!-- SEARCHABLE COUNTRY DROPDOWN -->

  <link
    href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css"
    rel="stylesheet"
  />

  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>

</head>

<body>

  <div class="page-container">

    <!-- Progress -->

    <div class="progress-wrapper">

      <div class="progress-bar">

        <div class="progress-fill"
             style="width: 27%">
        </div>

      </div>

      <p class="progress-text">
        Step 4 of 15
      </p>

    </div>

    <!-- Main Card -->

    <div class="content-card">

      <h1 class="page-title">
        Pre-Survey
      </h1>

      <p class="page-description">

        Before we start, please answer the following questions.

      </p>

      <!-- AGE -->

      <div class="question-card">

        <div class="question-title">
          Age
        </div>

        <input
          type="number"
          class="survey-input"
          id="age"
          min="18"
          placeholder="Enter your age"
          required />

      </div>

      <!-- GENDER -->

      <div class="question-card">

        <div class="question-title">
          Gender
        </div>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Woman">
          Woman
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Man">
          Man
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Non-binary">
          Non-binary
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Self-describe">
          Prefer to self-describe
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Prefer not to say">
          Prefer not to say
        </label>

      </div>

      <!-- COUNTRY -->

      <div class="question-card">

        <div class="question-title">
          Country of residence
        </div>

        <select
          class="survey-input"
          id="country"
          placeholder="Search country..."
        >

          <option value="">
            Search country...
          </option>

          <option>Afghanistan</option>
          <option>Albania</option>
          <option>Algeria</option>
          <option>Argentina</option>
          <option>Australia</option>
          <option>Austria</option>
          <option>Bangladesh</option>
          <option>Belgium</option>
          <option>Brazil</option>
          <option>Canada</option>
          <option>China</option>
          <option>Croatia</option>
          <option>Czech Republic</option>
          <option>Denmark</option>
          <option>Egypt</option>
          <option>Finland</option>
          <option>France</option>
          <option>Germany</option>
          <option>Greece</option>
          <option>Hungary</option>
          <option>India</option>
          <option>Indonesia</option>
          <option>Iran</option>
          <option>Iraq</option>
          <option>Ireland</option>
          <option>Italy</option>
          <option>Japan</option>
          <option>Malaysia</option>
          <option>Mexico</option>
          <option>Morocco</option>
          <option>Netherlands</option>
          <option>New Zealand</option>
          <option>Nigeria</option>
          <option>Norway</option>
          <option>Pakistan</option>
          <option>Philippines</option>
          <option>Poland</option>
          <option>Portugal</option>
          <option>Romania</option>
          <option>Russia</option>
          <option>Saudi Arabia</option>
          <option>Singapore</option>
          <option>South Africa</option>
          <option>South Korea</option>
          <option>Spain</option>
          <option>Sweden</option>
          <option>Switzerland</option>
          <option>Thailand</option>
          <option>Turkey</option>
          <option>Ukraine</option>
          <option>United Arab Emirates</option>
          <option>United Kingdom</option>
          <option>United States</option>
          <option>Vietnam</option>
          <option>Other</option>

        </select>

      </div>

      <!-- EDUCATION -->

      <div class="question-card">

        <div class="question-title">
          Highest education level
        </div>

        <select
          class="survey-input"
          id="education">

          <option value="">
            Select education level
          </option>

          <option>High school</option>
          <option>Bachelor's degree</option>
          <option>Master's degree</option>
          <option>Doctorate / PhD</option>
          <option>Other</option>

        </select>

      </div>

      <!-- EMPLOYMENT -->

      <div class="question-card">

        <div class="question-title">
          Employment status
        </div>

        <label class="radio-option">
          <input type="radio"
                 name="employment"
                 value="Student">
          Student
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="employment"
                 value="Employed">
          Employed
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="employment"
                 value="Unemployed">
          Unemployed
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="employment"
                 value="Other">
          Other
        </label>

      </div>

      <!-- INSTRUCTION -->

      <div class="instruction-card">

        Please read the statements below and indicate
        the extent to which you agree or disagree
        with each statement.

      </div>

      <!-- CONTINUE BUTTON -->

      <div class="button-container">

        <button
          class="primary-button"
          id="submitBtn">

          Continue

        </button>

      </div>

    </div>

  </div>

  <script>

    // =====================================
    // SEARCHABLE COUNTRY SELECT
    // =====================================

    new TomSelect(
      "#country",
      {
        create: false,
        sortField: {
          field: "text",
          direction: "asc"
        }
      }
    );

    // =====================================
    // VALIDATION
    // =====================================

    function validateSurvey() {

      const age =
        document.getElementById("age").value;

      const gender =
        document.querySelector(
          'input[name="gender"]:checked'
        );

      const country =
        document.getElementById("country").value;

      const education =
        document.getElementById("education").value;

      const employment =
        document.querySelector(
          'input[name="employment"]:checked'
        );

      if (
        !age ||
        !gender ||
        !country ||
        !education ||
        !employment
      ) {

        alert(
          "Please answer all required questions before continuing."
        );

        return false;

      }

      return true;

    }

    // =====================================
    // SUBMIT
    // =====================================

    document
      .getElementById(
        "submitBtn"
      )
      .addEventListener(
        "click",
        async () => {

          if (
            !validateSurvey()
          ) {
            return;
          }

          try {

            await fetch(
              "https://n8n.media.tuwien.ac.at/webhook/save-consent",
              {

                method: "POST",

                headers: {
                  "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({

                  action:
                    "save_presurvey",

                  session_id:
                    localStorage.getItem(
                      "sessionId"
                    ),

                  age:
                    document.getElementById(
                      "age"
                    ).value,

                  gender:
                    document.querySelector(
                      'input[name="gender"]:checked'
                    )?.value,

                  country:
                    document.getElementById(
                      "country"
                    ).value,

                  education:
                    document.getElementById(
                      "education"
                    ).value,

                  employment:
                    document.querySelector(
                      'input[name="employment"]:checked'
                    )?.value

                })

              }
            );

            window.location.href =
              "video-instruction.html";

          }

          catch (error) {

            console.error(error);

            alert(
              "Error saving survey."
            );

          }

        }
      );

  </script>

</body>

</html>
