```html
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0" />

  <title>Pre-Survey</title>

  <link rel="stylesheet"
        href="css/style.css" />

</head>

<body>

  <div class="page-container">

    <!-- Progress -->

    <div class="progress-wrapper">

      <div class="progress-bar">

        <div class="progress-fill"
             style="width: 40%">
        </div>

      </div>

      <p class="progress-text">
        Pre-Survey
      </p>

    </div>

    <!-- Main Card -->

    <div class="content-card">

      <h1 class="page-title">
        Pre-Survey
      </h1>

      <p class="page-description">

        Before we start, please answer the following questions.

      </p>

      <!-- AGE -->

      <div class="question-card">

        <div class="question-title">
          Age
        </div>

        <input
          type="number"
          class="survey-input"
          id="age"
          min="18"
          placeholder="Enter your age" />

      </div>

      <!-- GENDER -->

      <div class="question-card">

        <div class="question-title">
          Gender
        </div>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Woman">
          Woman
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Man">
          Man
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Non-binary">
          Non-binary
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Self-describe">
          Prefer to self-describe
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="gender"
                 value="Prefer not to say">
          Prefer not to say
        </label>

      </div>

      <!-- COUNTRY -->

      <div class="question-card">

        <div class="question-title">
          Country of residence
        </div>

        <select
          class="survey-input"
          id="country">

          <option value="">
            Select country
          </option>

          <option>Austria</option>
          <option>Germany</option>
          <option>Bangladesh</option>
          <option>United Kingdom</option>
          <option>United States</option>
          <option>Canada</option>
          <option>Australia</option>
          <option>Other</option>

        </select>

      </div>

      <!-- EDUCATION -->

      <div class="question-card">

        <div class="question-title">
          Highest education level
        </div>

        <select
          class="survey-input"
          id="education">

          <option value="">
            Select education level
          </option>

          <option>High school</option>
          <option>Bachelor's degree</option>
          <option>Master's degree</option>
          <option>Doctorate / PhD</option>
          <option>Other</option>

        </select>

      </div>

      <!-- EMPLOYMENT -->

      <div class="question-card">

        <div class="question-title">
          Employment status
        </div>

        <label class="radio-option">
          <input type="radio"
                 name="employment"
                 value="Student">
          Student
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="employment"
                 value="Employed">
          Employed
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="employment"
                 value="Unemployed">
          Unemployed
        </label>

        <label class="radio-option">
          <input type="radio"
                 name="employment"
                 value="Other">
          Other
        </label>

      </div>

      <!-- POLITICAL ORIENTATION -->

      <div class="question-card">

        <div class="question-title">
          Political orientation
        </div>

        <div class="likert-labels">

          <span>
            Very left/liberal
          </span>

          <span>
            Very right/conservative
          </span>

        </div>

        <div class="likert-scale">

          <label><input type="radio" name="political_orientation" value="1"><span>1</span></label>
          <label><input type="radio" name="political_orientation" value="2"><span>2</span></label>
          <label><input type="radio" name="political_orientation" value="3"><span>3</span></label>
          <label><input type="radio" name="political_orientation" value="4"><span>4</span></label>
          <label><input type="radio" name="political_orientation" value="5"><span>5</span></label>
          <label><input type="radio" name="political_orientation" value="6"><span>6</span></label>
          <label><input type="radio" name="political_orientation" value="7"><span>7</span></label>

        </div>

      </div>

      <!-- RELIGIOSITY -->

      <div class="question-card">

        <div class="question-title">
          Religiosity
        </div>

        <div class="likert-labels">

          <span>
            Not religious at all
          </span>

          <span>
            Very religious
          </span>

        </div>

        <div class="likert-scale">

          <label><input type="radio" name="religiosity" value="1"><span>1</span></label>
          <label><input type="radio" name="religiosity" value="2"><span>2</span></label>
          <label><input type="radio" name="religiosity" value="3"><span>3</span></label>
          <label><input type="radio" name="religiosity" value="4"><span>4</span></label>
          <label><input type="radio" name="religiosity" value="5"><span>5</span></label>
          <label><input type="radio" name="religiosity" value="6"><span>6</span></label>
          <label><input type="radio" name="religiosity" value="7"><span>7</span></label>

        </div>

      </div>

      <!-- CONTINUE -->

      <div class="button-container">

        <button
          class="primary-button"
          id="submitBtn">

          Continue

        </button>

      </div>

    </div>

  </div>

  <script>

    document
      .getElementById(
        "submitBtn"
      )
      .addEventListener(
        "click",
        async () => {

          try {

            await fetch(
              "https://n8n.media.tuwien.ac.at/webhook/save-consent",
              {

                method: "POST",

                headers: {
                  "Content-Type":
                    "application/json"
                },

                body: JSON.stringify({

                  action:
                    "save_presurvey",

                  session_id:
                    localStorage.getItem(
                      "session_id"
                    ),

                  age:
                    document.getElementById(
                      "age"
                    ).value,

                  gender:
                    document.querySelector(
                      'input[name="gender"]:checked'
                    )?.value,

                  country:
                    document.getElementById(
                      "country"
                    ).value,

                  education:
                    document.getElementById(
                      "education"
                    ).value

                })

              }
            );

            window.location.href =
              "video-instruction.html";

          }

          catch (error) {

            console.error(error);

            alert(
              "Error saving survey."
            );

          }

        }
      );

  </script>

</body>

</html>
```
