<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Pre-Survey</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    />

</head>

<body>

    <div class="page-container">

        <!-- Progress -->

        <div class="progress-wrapper">

            <div class="progress-bar">
                <div
                    class="progress-fill"
                    style="width: 60%;"
                ></div>
            </div>

            <div class="progress-text">
                Step 3 of 5
            </div>

        </div>

        <!-- Main Card -->

        <div class="content-card">

            <h1 class="page-title">
                Pre-Survey
            </h1>

            <p class="page-description">
                Please answer the following questions
                before interacting with the chatbot.
            </p>

            <!-- AGE -->

            <div class="question-card">

                <div class="question-title">
                    Age Range
                </div>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    18–24
                </label>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    25–34
                </label>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    35–44
                </label>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    45–54
                </label>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    55+
                </label>

            </div>

            <!-- GENDER -->

            <div class="question-card">

                <div class="question-title">
                    Gender
                </div>

                <label class="radio-option">
                    <input type="radio" name="gender" />
                    Male
                </label>

                <label class="radio-option">
                    <input type="radio" name="gender" />
                    Female
                </label>

                <label class="radio-option">
                    <input type="radio" name="gender" />
                    Non-binary
                </label>

                <label class="radio-option">
                    <input type="radio" name="gender" />
                    Prefer not to say
                </label>

            </div>

            <!-- EDUCATION -->

            <div class="question-card">

                <div class="question-title">
                    Highest Education Level
                </div>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    High school
                </label>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    Bachelor's degree
                </label>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    Master's degree
                </label>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    PhD
                </label>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    Other
                </label>

            </div>

            <!-- FAMILIARITY -->

            <div class="question-card">

                <div class="question-title">
                    How familiar are you with AI chatbots?
                </div>

                <label class="radio-option">
                    <input type="radio" name="familiarity" />
                    Not familiar
                </label>

                <label class="radio-option">
                    <input type="radio" name="familiarity" />
                    Slightly familiar
                </label>

                <label class="radio-option">
                    <input type="radio" name="familiarity" />
                    Moderately familiar
                </label>

                <label class="radio-option">
                    <input type="radio" name="familiarity" />
                    Very familiar
                </label>

            </div>

            <!-- BUTTON -->

            <div class="button-container">

                <button
                    class="primary-button"
                    id="continueButton"
                >
                    Continue
                </button>

            </div>

        </div>

    </div>

    <script>

        /*
        ==========================================
        RANDOM CONDITION ASSIGNMENT
        ==========================================
        */

        const conditions = [

            "condition_1",

            "condition_2",

            "condition_3",

            "condition_4"

        ];

        const randomCondition =

            conditions[
                Math.floor(
                    Math.random() * conditions.length
                )
            ];

        localStorage.setItem(
            "condition",
            randomCondition
        );

        /*
        ==========================================
        CONTINUE BUTTON
        ==========================================
        */

        document
            .getElementById("continueButton")
            .addEventListener("click", () => {

                window.location.href =
                    "chat.html";

            });

    </script>

</body>

</html>
