<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <title>Pre-Survey</title>

  <link rel="stylesheet"
        href="css/style.css">

</head>

<body>

  <!-- PROGRESS BAR -->

  <div class="progress-container">

    <div class="progress-bar"
         style="width: 50%;">
    </div>

  </div>

  <p class="step-text">
    Step 3 of 6
  </p>

  <!-- MAIN CARD -->

  <div class="survey-card">

    <h1 class="page-title">
      Pre-Survey
    </h1>

    <p class="page-description">

      Please answer the following questions before interacting with the chatbot.

    </p>

    <!-- FORM -->

    <form id="preSurveyForm">

      <!-- AGE -->

      <div class="question-block">

        <p class="question-label">
          Age Range
        </p>

        <label class="radio-option">

          <input type="radio"
                 name="age"
                 value="18-24"
                 required>

          18–24

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="age"
                 value="25-34">

          25–34

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="age"
                 value="35-44">

          35–44

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="age"
                 value="45-54">

          45–54

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="age"
                 value="55+">

          55+

        </label>

      </div>

      <!-- GENDER -->

      <div class="question-block">

        <p class="question-label">
          Gender
        </p>

        <label class="radio-option">

          <input type="radio"
                 name="gender"
                 value="Male"
                 required>

          Male

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="gender"
                 value="Female">

          Female

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="gender"
                 value="Non-binary">

          Non-binary

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="gender"
                 value="Prefer not to say">

          Prefer not to say

        </label>

      </div>

      <!-- EDUCATION -->

      <div class="question-block">

        <p class="question-label">
          Highest Education Level
        </p>

        <label class="radio-option">

          <input type="radio"
                 name="education"
                 value="High school"
                 required>

          High school

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="education"
                 value="Bachelor">

          Bachelor's degree

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="education"
                 value="Master">

          Master's degree

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="education"
                 value="PhD">

          PhD

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="education"
                 value="Other">

          Other

        </label>

      </div>

      <!-- AI FAMILIARITY -->

      <div class="question-block">

        <p class="question-label">
          How familiar are you with AI chatbots?
        </p>

        <label class="radio-option">

          <input type="radio"
                 name="aiFamiliarity"
                 value="Not familiar"
                 required>

          Not familiar

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="aiFamiliarity"
                 value="Slightly familiar">

          Slightly familiar

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="aiFamiliarity"
                 value="Moderately familiar">

          Moderately familiar

        </label>

        <label class="radio-option">

          <input type="radio"
                 name="aiFamiliarity"
                 value="Very familiar">

          Very familiar

        </label>

      </div>

      <!-- CONTINUE BUTTON -->

      <button type="submit"
              class="primary-button">

        Continue

      </button>

    </form>

  </div>

  <!-- JAVASCRIPT -->

  <script>

    document
      .getElementById("preSurveyForm")
      .addEventListener(
        "submit",
        function(event) {

          event.preventDefault();

          const preSurveyData = {

            age:
              document.querySelector(
                'input[name="age"]:checked'
              ).value,

            gender:
              document.querySelector(
                'input[name="gender"]:checked'
              ).value,

            education:
              document.querySelector(
                'input[name="education"]:checked'
              ).value,

            aiFamiliarity:
              document.querySelector(
                'input[name="aiFamiliarity"]:checked'
              ).value,

            timestamp:
              new Date().toISOString()

          };

          localStorage.setItem(
            "preSurveyData",
            JSON.stringify(preSurveyData)
          );

          // NEXT PAGE

          window.location.href =
            "chat.html";

        }
      );

  </script>

</body>

</html>
