<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8" />

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    />

    <title>Pre-Survey</title>

    <link
        rel="stylesheet"
        href="css/style.css"
    />

</head>

<body>

    <div class="page-container">

        <!-- Progress -->

        <div class="progress-wrapper">

            <div class="progress-bar">
                <div
                    class="progress-fill"
                    style="width: 60%;"
                ></div>
            </div>

            <div class="progress-text">
                Step 3 of 5
            </div>

        </div>

        <!-- Main Card -->

        <div class="content-card">

            <h1 class="page-title">
                Pre-Survey
            </h1>

            <p class="page-description">
                Please answer the following questions
                before interacting with the chatbot.
            </p>

            <!-- AGE -->

            <div class="question-card">

                <div class="question-title">
                    Age Range
                </div>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    18–24
                </label>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    25–34
                </label>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    35–44
                </label>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    45–54
                </label>

                <label class="radio-option">
                    <input type="radio" name="age" />
                    55+
                </label>

            </div>

            <!-- GENDER -->

            <div class="question-card">

                <div class="question-title">
                    Gender
                </div>

                <label class="radio-option">
                    <input type="radio" name="gender" />
                    Male
                </label>

                <label class="radio-option">
                    <input type="radio" name="gender" />
                    Female
                </label>

                <label class="radio-option">
                    <input type="radio" name="gender" />
                    Non-binary
                </label>

                <label class="radio-option">
                    <input type="radio" name="gender" />
                    Prefer not to say
                </label>

            </div>

            <!-- EDUCATION -->

            <div class="question-card">

                <div class="question-title">
                    Highest Education Level
                </div>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    High school
                </label>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    Bachelor's degree
                </label>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    Master's degree
                </label>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    PhD
                </label>

                <label class="radio-option">
                    <input type="radio" name="education" />
                    Other
                </label>

            </div>

            <!-- FAMILIARITY -->

            <div class="question-card">

                <div class="question-title">
                    How familiar are you with AI chatbots?
                </div>

                <label class="radio-option">
                    <input type="radio" name="familiarity" />
                    Not familiar
                </label>

                <label class="radio-option">
                    <input type="radio" name="familiarity" />
                    Slightly familiar
                </label>

                <label class="radio-option">
                    <input type="radio" name="familiarity" />
                    Moderately familiar
                </label>

                <label class="radio-option">
                    <input type="radio" name="familiarity" />
                    Very familiar
                </label>

            </div>

            <!-- BUTTON -->

            <div class="button-container">

                <button
                    class="primary-button"
                    id="continueButton"
                >
                    Continue
                </button>

            </div>

        </div>

    </div>

  <script>

    /*
    ==========================================
    RANDOM CONDITION ASSIGNMENT
    ==========================================
    */

    const conditions = [

        "condition_1",
        "condition_2",
        "condition_3",
        "condition_4"

    ];

    let assignedCondition =
        localStorage.getItem("condition");

    if (!assignedCondition) {

        assignedCondition =

            conditions[
                Math.floor(
                    Math.random() * conditions.length
                )
            ];

        localStorage.setItem(
            "condition",
            assignedCondition
        );

    }

    /*
    ==========================================
    CONTINUE BUTTON
    ==========================================
    */

    document
        .getElementById("continueButton")
        .addEventListener("click", async () => {

            // =========================
            // GET ANSWERS
            // =========================

            const age =
                document.querySelector(
                    'input[name="age"]:checked'
                )?.parentElement.textContent.trim();

            const gender =
                document.querySelector(
                    'input[name="gender"]:checked'
                )?.parentElement.textContent.trim();

            const education =
                document.querySelector(
                    'input[name="education"]:checked'
                )?.parentElement.textContent.trim();

            const familiarity =
                document.querySelector(
                    'input[name="familiarity"]:checked'
                )?.parentElement.textContent.trim();

            // =========================
            // VALIDATION
            // =========================

            if (
                !age ||
                !gender ||
                !education ||
                !familiarity
            ) {

                alert(
                    "Please answer all questions before continuing."
                );

                return;

            }

            // =========================
            // STORE LOCALLY
            // =========================

            localStorage.setItem("age", age);
            localStorage.setItem("gender", gender);
            localStorage.setItem("education", education);
            localStorage.setItem("familiarity", familiarity);

            try {

                // =========================
                // SEND TO N8N
                // =========================

                await fetch(
                    "https://n8n.media.tuwien.ac.at/webhook/save-consent",
                    {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json"
                        },

                        body: JSON.stringify({

                            action: "save_pre_survey",

                            session_id:
                                localStorage.getItem("SESSION_ID"),

                            condition:
                                localStorage.getItem("condition"),

                            age: age,

                            gender: gender,

                            education: education,

                            familiarity: familiarity

                        })

                    }
                );

                // =========================
                // MOVE TO CHAT PAGE
                // =========================

                window.location.href =
                    "chat.html";

            }

            catch (error) {

                console.error(error);

                alert(
                    "Error saving survey data."
                );

            }

        });

</script>
</body>

</html>
